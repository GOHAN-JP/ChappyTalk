<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- 背景（角丸） -->
  <rect width="256" height="256" rx="40" ry="40" fill="#7C3AED"/>

  <!-- 吹き出し -->
  <rect x="40" y="35" width="160" height="110" rx="20" ry="20" fill="white"/>
  <polygon points="80,145 100,175 120,145" fill="white"/>

  <!-- マイクアイコン（吹き出しの中央） -->
  <rect x="108" y="55" width="40" height="60" rx="20" ry="20" fill="#7C3AED"/>

  <!-- マイクのスタンド -->
  <path d="M 98 95 Q 98 125 128 125 Q 158 125 158 95" fill="none" stroke="#7C3AED" stroke-width="6" stroke-linecap="round"/>
  <line x1="128" y1="125" x2="128" y2="138" stroke="#7C3AED" stroke-width="6" stroke-linecap="round"/>
  <line x1="113" y1="138" x2="143" y2="138" stroke="#7C3AED" stroke-width="6" stroke-linecap="round"/>

  <!-- 音波（右） -->
  <path d="M 175 70 Q 190 90 175 110" fill="none" stroke="#A78BFA" stroke-width="5" stroke-linecap="round"/>
  <path d="M 185 58 Q 208 90 185 122" fill="none" stroke="#C4B5FD" stroke-width="5" stroke-linecap="round"/>

  <!-- 音波（左） -->
  <path d="M 81 70 Q 66 90 81 110" fill="none" stroke="#A78BFA" stroke-width="5" stroke-linecap="round"/>
  <path d="M 71 58 Q 48 90 71 122" fill="none" stroke="#C4B5FD" stroke-width="5" stroke-linecap="round"/>

  <!-- ChappyTalk テキスト -->
  <text x="128" y="215" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="bold" fill="white">ChappyTalk</text>
</svg>
